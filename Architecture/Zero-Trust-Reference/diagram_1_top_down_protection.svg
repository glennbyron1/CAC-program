<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1424"/>
      <stop offset="1" stop-color="#0a101d"/>
    </linearGradient>
    <linearGradient id="gov" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3a2f12"/><stop offset="1" stop-color="#1a2034"/></linearGradient>
    <linearGradient id="pe" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0e2c3a"/><stop offset="1" stop-color="#16223a"/></linearGradient>
    <linearGradient id="pep" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0d3231"/><stop offset="1" stop-color="#16223a"/></linearGradient>
    <linearGradient id="pil" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#142a44"/><stop offset="1" stop-color="#16223a"/></linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0c3a2c"/><stop offset="1" stop-color="#0f4636"/></linearGradient>
    <style>
      .lbl{fill:#8da2bd;font-size:11px;letter-spacing:3px}
      .h1{fill:#f3f7fc;font-size:34px;font-weight:700;letter-spacing:1px}
      .sub{fill:#7f93ad;font-size:14px}
      .layerH{font-size:18px;font-weight:700;letter-spacing:2px;fill:#eef4fb}
      .layerS{font-size:12px;fill:#9fb2cc;font-family:ui-monospace,Menlo,Consolas,monospace}
      .tag{font-size:10px;letter-spacing:3px;fill:#0a101d;font-weight:700}
      .pilH{font-size:13px;font-weight:700;fill:#eef4fb;letter-spacing:1px}
      .rail{fill:#6f86a3;font-size:11px;letter-spacing:4px;font-weight:700}
      .foot{fill:#6f86a3;font-size:12px;letter-spacing:1px}
      .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
    </style>
  </defs>

  <rect width="1000" height="880" fill="url(#bg)"/>
  <g stroke="#14233c" stroke-width="1" opacity="0.5">
    <line x1="0" y1="220" x2="1000" y2="220"/><line x1="0" y1="440" x2="1000" y2="440"/><line x1="0" y1="660" x2="1000" y2="660"/>
  </g>

  <!-- header -->
  <text x="60" y="58" class="lbl">ZERO TRUST &#8226; NEVER TRUST, ALWAYS VERIFY</text>
  <text x="58" y="96" class="h1">Top&#8211;Down Protection Model</text>
  <text x="60" y="122" class="sub">Authority and policy cascade downward &#183; visibility and telemetry flow upward &#183; data sits at the protected core.</text>

  <!-- left rail: authority flows down -->
  <g>
    <line x1="40" y1="172" x2="40" y2="690" stroke="#f5b748" stroke-width="2"/>
    <polygon points="40,712 32,690 48,690" fill="#f5b748"/>
    <text x="22" y="440" class="rail" fill="#f5b748" transform="rotate(-90 22 440)" text-anchor="middle">POLICY &amp; AUTHORITY  &#8595;</text>
  </g>
  <!-- right rail: telemetry flows up -->
  <g>
    <line x1="960" y1="712" x2="960" y2="194" stroke="#38bdf8" stroke-width="2"/>
    <polygon points="960,172 952,194 968,194" fill="#38bdf8"/>
    <text x="978" y="440" class="rail" fill="#38bdf8" transform="rotate(90 978 440)" text-anchor="middle">SIGNALS &amp; TELEMETRY  &#8593;</text>
  </g>

  <!-- L1 Governance -->
  <g>
    <rect x="170" y="170" width="660" height="66" rx="10" fill="url(#gov)" stroke="#f5b748" stroke-opacity="0.55"/>
    <rect x="170" y="170" width="6" height="66" rx="3" fill="#f5b748"/>
    <rect x="700" y="184" width="118" height="20" rx="10" fill="#f5b748"/><text x="759" y="198" class="tag" text-anchor="middle">LEADERSHIP</text>
    <text x="196" y="200" class="layerH">GOVERNANCE &amp; STRATEGY</text>
    <text x="196" y="222" class="layerS">Risk posture &#183; policy authoring &#183; RMF / NIST 800-53 mapping &#183; oversight</text>
  </g>
  <path d="M500 236 l12 0 -12 14 -12 -14 z" fill="#42546f"/>

  <!-- L2 Policy Decision -->
  <g>
    <rect x="170" y="256" width="660" height="66" rx="10" fill="url(#pe)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="170" y="256" width="6" height="66" rx="3" fill="#38bdf8"/>
    <rect x="700" y="270" width="118" height="20" rx="10" fill="#38bdf8"/><text x="759" y="284" class="tag" text-anchor="middle">THE BRAIN</text>
    <text x="196" y="286" class="layerH">POLICY DECISION POINT</text>
    <text x="196" y="308" class="layerS">Policy Engine (decide) + Policy Administrator (execute / issue tokens)</text>
  </g>
  <path d="M500 322 l12 0 -12 14 -12 -14 z" fill="#42546f"/>

  <!-- L3 Policy Enforcement -->
  <g>
    <rect x="170" y="342" width="660" height="66" rx="10" fill="url(#pep)" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <rect x="170" y="342" width="6" height="66" rx="3" fill="#2dd4bf"/>
    <rect x="700" y="356" width="118" height="20" rx="10" fill="#2dd4bf"/><text x="759" y="370" class="tag" text-anchor="middle">THE GATE</text>
    <text x="196" y="372" class="layerH">POLICY ENFORCEMENT POINT</text>
    <text x="196" y="394" class="layerS">Sits in front of every resource &#183; default&#8211;deny &#183; per&#8211;session, per&#8211;request</text>
  </g>
  <path d="M500 408 l12 0 -12 14 -12 -14 z" fill="#42546f"/>

  <!-- L4 Pillars -->
  <g>
    <rect x="170" y="428" width="660" height="96" rx="10" fill="url(#pil)" stroke="#60a5fa" stroke-opacity="0.45"/>
    <rect x="170" y="428" width="6" height="96" rx="3" fill="#60a5fa"/>
    <text x="196" y="452" class="layerS" fill="#9fb2cc">ENFORCEMENT DOMAINS (THE PILLARS)</text>
    <g>
      <rect x="198" y="462" width="148" height="48" rx="8" fill="#0f1d33" stroke="#2a3e5e"/><text x="272" y="491" class="pilH" text-anchor="middle">IDENTITY</text>
      <rect x="356" y="462" width="148" height="48" rx="8" fill="#0f1d33" stroke="#2a3e5e"/><text x="430" y="491" class="pilH" text-anchor="middle">DEVICE</text>
      <rect x="514" y="462" width="148" height="48" rx="8" fill="#0f1d33" stroke="#2a3e5e"/><text x="588" y="491" class="pilH" text-anchor="middle">NETWORK</text>
      <rect x="672" y="462" width="140" height="48" rx="8" fill="#0f1d33" stroke="#2a3e5e"/><text x="742" y="485" class="pilH" text-anchor="middle">APPS &amp;</text><text x="742" y="501" class="pilH" text-anchor="middle">WORKLOADS</text>
    </g>
  </g>
  <path d="M500 524 l12 0 -12 14 -12 -14 z" fill="#42546f"/>

  <!-- L5 Data core -->
  <g>
    <rect x="330" y="544" width="340" height="72" rx="12" fill="url(#data)" stroke="#34d399" stroke-width="2"/>
    <text x="500" y="578" class="layerH" text-anchor="middle" fill="#d6ffe9">DATA</text>
    <text x="500" y="600" class="layerS" text-anchor="middle" fill="#8fe7c0">the protected core &#8212; classify &#183; encrypt &#183; least privilege</text>
  </g>

  <!-- cross-cutting band -->
  <rect x="170" y="648" width="660" height="48" rx="10" fill="#101b30" stroke="#3a4f70" stroke-dasharray="5 4"/>
  <text x="500" y="670" text-anchor="middle" class="layerS" fill="#bcd0ea" letter-spacing="1px">CROSS&#8211;CUTTING &#8212; CONTINUOUS ACROSS EVERY LAYER</text>
  <text x="500" y="688" text-anchor="middle" class="layerS" fill="#7f93ad">Visibility &amp; Analytics &#160;&#183;&#160; Automation &amp; Orchestration</text>

  <!-- footer -->
  <line x1="60" y1="730" x2="940" y2="730" stroke="#1d2c46"/>
  <text x="60" y="760" class="foot mono">Authority sets policy &#8594; PDP decides &#8594; PEP enforces &#8594; pillars contain &#8594; data is protected.</text>
  <text x="60" y="800" class="foot">Frameworks: NIST SP 800&#8211;207 &#160;&#183;&#160; DoD Zero Trust Strategy (7 pillars) &#160;&#183;&#160; CISA ZTMM v2.0</text>
</svg>
