<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 740" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1424"/><stop offset="1" stop-color="#0a101d"/></linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7fd2f4"/></marker>
    <marker id="arA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f5b748"/></marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f0709a"/></marker>
    <style>
      .lbl{fill:#8da2bd;font-size:11px;letter-spacing:3px}
      .h1{fill:#f3f7fc;font-size:30px;font-weight:700;letter-spacing:0.5px}
      .sub{fill:#7f93ad;font-size:13.5px}
      .boxH{font-size:14px;font-weight:700;fill:#eef4fb;letter-spacing:0.5px}
      .boxS{font-size:10.5px;fill:#9fb2cc}
      .step{font-size:12px;fill:#cfe6f6;font-weight:700}
      .chip{font-size:9.5px;fill:#cfe0f2}
      .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
      .foot{fill:#6f86a3;font-size:12px}
    </style>
  </defs>

  <rect width="1040" height="740" fill="url(#bg4)"/>

  <text x="60" y="54" class="lbl">ZERO TRUST &#8226; ANATOMY OF ONE REQUEST</text>
  <text x="58" y="92" class="h1">How a Single Access Request Flows</text>
  <text x="60" y="116" class="sub">Nothing connects directly. Every request is brokered, decided on live signals, and granted only for that session.</text>

  <!-- PDP cluster -->
  <rect x="288" y="150" width="600" height="168" rx="14" fill="#0d1830" stroke="#2a3e5e"/>
  <text x="308" y="174" class="lbl" fill="#7f93ad" letter-spacing="2px">POLICY DECISION POINT (PDP) &#8212; THE CONTROL PLANE</text>

  <!-- data source chips -->
  <g>
    <rect x="308" y="186" width="92" height="26" rx="13" fill="#13243c" stroke="#33506f"/><text x="354" y="203" class="chip" text-anchor="middle">ICAM / PKI</text>
    <rect x="406" y="186" width="104" height="26" rx="13" fill="#13243c" stroke="#33506f"/><text x="458" y="203" class="chip" text-anchor="middle">Device posture</text>
    <rect x="516" y="186" width="98" height="26" rx="13" fill="#13243c" stroke="#33506f"/><text x="565" y="203" class="chip" text-anchor="middle">Threat intel</text>
    <rect x="620" y="186" width="92" height="26" rx="13" fill="#13243c" stroke="#33506f"/><text x="666" y="203" class="chip" text-anchor="middle">Data policy</text>
    <rect x="718" y="186" width="92" height="26" rx="13" fill="#13243c" stroke="#33506f"/><text x="764" y="203" class="chip" text-anchor="middle">Risk / SIEM</text>
  </g>

  <!-- Policy Engine -->
  <rect x="308" y="226" width="262" height="78" rx="9" fill="#0e2c3a" stroke="#38bdf8"/>
  <text x="324" y="252" class="boxH" fill="#bfe8fb">POLICY ENGINE</text>
  <text x="324" y="271" class="boxS">Runs the trust algorithm on</text>
  <text x="324" y="286" class="boxS">live signals &#8594; grant / deny / revoke</text>
  <!-- Policy Administrator -->
  <rect x="606" y="226" width="262" height="78" rx="9" fill="#0d3231" stroke="#2dd4bf"/>
  <text x="622" y="252" class="boxH" fill="#b9f4e7">POLICY ADMINISTRATOR</text>
  <text x="622" y="271" class="boxS">Issues session token &amp;</text>
  <text x="622" y="286" class="boxS">opens / closes the path</text>
  <!-- PE -> PA -->
  <line x1="570" y1="265" x2="606" y2="265" stroke="#7fd2f4" stroke-width="2" marker-end="url(#ar)"/>
  <text x="588" y="256" class="step" text-anchor="middle" font-size="11">&#9314;</text>

  <!-- bottom row: subject / PEP / resource -->
  <!-- Subject -->
  <rect x="58" y="446" width="196" height="120" rx="12" fill="#11243b" stroke="#60a5fa"/>
  <text x="156" y="486" class="boxH" text-anchor="middle">SUBJECT</text>
  <text x="156" y="508" class="boxS" text-anchor="middle">user &#183; workstation</text>
  <text x="156" y="524" class="boxS" text-anchor="middle">server &#183; service / workload</text>
  <text x="156" y="546" class="boxS mono" text-anchor="middle" fill="#7f93ad">untrusted by default</text>

  <!-- PEP -->
  <rect x="430" y="446" width="216" height="120" rx="12" fill="#1d160a" stroke="#f5b748" stroke-width="2"/>
  <text x="538" y="486" class="boxH" text-anchor="middle" fill="#f7d488">POLICY ENFORCEMENT POINT</text>
  <text x="538" y="508" class="boxS" text-anchor="middle">The gate in front of the resource</text>
  <text x="538" y="526" class="boxS" text-anchor="middle">&#8212; default&#8211;deny until authorized</text>
  <text x="538" y="548" class="boxS mono" text-anchor="middle" fill="#caa45a">enables &#183; monitors &#183; terminates</text>

  <!-- Resource -->
  <rect x="824" y="446" width="196" height="120" rx="12" fill="#0e2c22" stroke="#34d399"/>
  <text x="922" y="486" class="boxH" text-anchor="middle" fill="#cdffe6">RESOURCE</text>
  <text x="922" y="508" class="boxS" text-anchor="middle">data &#183; application</text>
  <text x="922" y="524" class="boxS" text-anchor="middle">API &#183; service &#183; server</text>
  <text x="922" y="546" class="boxS mono" text-anchor="middle" fill="#6fb397">access scoped to session</text>

  <!-- (1) subject -> PEP -->
  <line x1="254" y1="500" x2="430" y2="500" stroke="#7fd2f4" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="342" y="490" class="step" text-anchor="middle">&#9312; request</text>

  <!-- (2) PEP -> PE (up) -->
  <path d="M470 446 L440 304" fill="none" stroke="#7fd2f4" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="404" y="380" class="step" text-anchor="middle">&#9313; consult</text>

  <!-- (4) PA -> PEP (down) -->
  <path d="M712 304 L600 446" fill="none" stroke="#f5b748" stroke-width="2.5" marker-end="url(#arA)"/>
  <text x="700" y="380" class="step" text-anchor="middle" fill="#f7d488">&#9315; token /</text>
  <text x="700" y="396" class="step" text-anchor="middle" fill="#f7d488">instruct</text>

  <!-- (5) PEP -> resource -->
  <line x1="646" y1="500" x2="824" y2="500" stroke="#34d399" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="735" y="490" class="step" text-anchor="middle" fill="#9be9c4">&#9316; allow</text>

  <!-- (6) feedback resource -> PE -->
  <path d="M922 446 C922 360 980 330 980 250 C980 150 700 150 660 186" fill="none" stroke="#f0709a" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arR)"/>
  <text x="958" y="408" class="step" text-anchor="end" fill="#f3a9c2" font-size="11">&#9317; continuous eval</text>
  <text x="958" y="424" class="step" text-anchor="end" fill="#f3a9c2" font-size="11">&#8594; revoke if risk rises</text>

  <!-- footer -->
  <line x1="60" y1="624" x2="980" y2="624" stroke="#1d2c46"/>
  <text x="60" y="652" class="foot mono">&#9312; request &#8594; &#9313; PEP consults PDP &#8594; &#9314; engine decides &#8594; &#9315; admin issues token &#8594; &#9316; enforced, per&#8211;session &#8594; &#9317; monitored continuously</text>
  <text x="60" y="688" class="foot">No standing trust: yesterday&#8217;s approval &#8212; or five minutes ago &#8212; does not authorize the next request.</text>
  <text x="60" y="714" class="foot" fill="#566c8a">Logical components per NIST SP 800&#8211;207 (Policy Engine, Policy Administrator, Policy Enforcement Point).</text>
</svg>
