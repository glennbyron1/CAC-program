name: Trivy — Container Vulnerability Scan

# Builds the scap-summary Docker image and scans it for CVEs using Trivy.
# Fails the build on CRITICAL or HIGH severity vulnerabilities in the OS layer
# or installed packages. Results are uploaded to GitHub Security tab (SARIF).
#
# This mirrors the container scanning step in a DoD DevSecOps pipeline —
# equivalent to what Platform One / Iron Bank runs before accepting an image.

on:
  push:
    paths:
      - 'docker/**'
      - '.github/workflows/trivy.yml'
  pull_request:
    paths:
      - 'docker/**'
  schedule:
    # Daily scan at 05:00 UTC — catches newly published CVEs in unchanged images
    - cron: '0 5 * * *'

jobs:
  trivy-scan:
    name: Trivy — Container CVE Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Required to upload SARIF to GitHub Security tab

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag scap-summary:scan \
            --file docker/scap-summary/Dockerfile \
            docker/scap-summary/

      - name: Run Trivy — fail on CRITICAL or HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scap-summary:scan'
          format: 'table'
          exit-code: '1'              # Fail the build if issues found
          ignore-unfixed: true        # Skip CVEs with no available fix (reduces noise)
          severity: 'CRITICAL,HIGH'   # CAT I equivalent — must be clean before merge
          vuln-type: 'os,library'

      - name: Run Trivy — upload full results to GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: always()                  # Run even if the previous step failed
        with:
          image-ref: 'scap-summary:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

      - name: Print scan summary
        if: always()
        run: |
          echo "========================================================"
          echo "  Trivy Container Scan — scap-summary:scan"
          echo "  Severity threshold: CRITICAL + HIGH (CAT I equivalent)"
          echo "  Results visible in: Security → Code scanning alerts"
          echo "========================================================"
