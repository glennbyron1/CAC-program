# Phase 8 add-on - Ansible STIG remediation for LAB-DC01
# NOTE: When running from /mnt/c (a world-writable DrvFs mount), Ansible ignores
# a cfg in the CWD for safety. Always invoke with an explicit path, e.g.:
#   export ANSIBLE_CONFIG=/mnt/c/path/to/CAC-program/Lab-Kit/08-Ansible-STIG/ansible.cfg
[defaults]
inventory            = inventory.ini
roles_path           = roles
collections_path     = collections
host_key_checking    = False
retry_files_enabled  = False
stdout_callback       = default
result_format         = yaml
deprecation_warnings  = False
# ansible-core 2.21 errors on non-boolean conditionals; the ansible-lockdown
# role predates that strictness. Restore the lenient (pre-2.21) behaviour so the
# role's many regex_search/when conditionals evaluate as truthy/falsy.
allow_broken_conditionals = True
interpreter_python    = auto_silent
# Keep run artifacts (audit reports, logs) next to the project
log_path             = ./ansible-run.log

[inventory]
enable_plugins = ini

[winrm]
# pywinrm tuning for a single DC over the lab network
